<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link
      rel="preload"
      href="./assets/fonts/inter-v20-latin-regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="./assets/fonts/inter-v20-latin-600.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="./assets/fonts/inter-v20-latin-700.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <link rel="stylesheet" href="styles.css" />

    <title>Frontend Mentor | Social links profile</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  </head>
  <body>
    <main>
      <article class="card">
        <img
          src="assets/images/avatar-jessica.jpeg"
          alt=""
          class="card__img"
          width="176"
          height="176"
        />
        <h1 class="card__name">Jessica Randall</h1>
        <p class="card__location">London, United Kingdom</p>
        <p class="card__description">"Front-end developer and avid reader."</p>
        <ul role="list" class="card__links">
          <li class="card__links-li">
            <a class="card__links-a" href="#">GitHub</a>
          </li>
          <li class="card__links-li">
            <a class="card__links-a" href="#">Frontend Mentor</a>
          </li>
          <li class="card__links-li">
            <a class="card__links-a" href="#">LinkedIn</a>
          </li>
          <li class="card__links-li">
            <a class="card__links-a" href="#">Twitter</a>
          </li>
          <li class="card__links-li">
            <a class="card__links-a" href="#">Instagram</a>
          </li>
        </ul>
      </article>
    </main>
  </body>
</html>
